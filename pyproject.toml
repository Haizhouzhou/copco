[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "copco-eye-bench"
version = "0.0.0"
description = "Research code for CopCo / Eye Bench Danish natural-reading eye-tracking analysis."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "TBD" }
authors = [
  { name = "CopCo Eye Bench contributors" },
]
dependencies = []

[project.optional-dependencies]
dev = [
  "pytest>=8",
  "ruff>=0.4",
]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py310"
